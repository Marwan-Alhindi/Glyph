name: Mirror to Bitbucket

on: [push]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Bitbucket
        run: |
          git remote add bitbucket https://x-token-auth:${{ secrets.BITBUCKET_APP_PASSWORD }}@bitbucket.org/glypho/glyph.git
          git push bitbucket --all
          git push bitbucket --tags
